    </div>
    <div class="nav-right">
      <a href="#" class="btn-getapp">⊞ Get app</a>
    </div>
  </nav>

  <!-- PAGE WRAPPER -->

    <aside class="left-sidebar">
      <ul class="sidebar-menu">
        <li class="menu-item">
          <span class="menu-icon"></span>

        </li>
        <li class="menu-item">
          <span class="menu-icon"></span>
          <a href="library.html">Library</a>
        </li>
        <li class="menu-item">
          <span class="menu-icon"></span>

        <li class="menu-item active">

        <li class="menu-item">
          <span class="menu-icon"></span>

        <div>

    <main class="stories-main">

      <h1 class="stories-title">Stories</h1>

      <div class="stories-tabs">

        <div class="stories-tab">Unlisted</div>

      <!-- EMPTY STATE -->
      <div class="empty-state">
        <p class="empty-text">No stories in draft.</p>
        <p class="empty-sub">Why not <a href="write.html" class="start-link">start writing one?</a></p>
      </div>

    </main>
