<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Clone</title>

    <link rel="stylesheet" href="style3.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="nav-left">
            <span>File</span>
            <span>Resize</span>
            <span>Editing <i class="fa-solid fa-angle-down"></i></span>

            <i class="fa-solid fa-arrow-rotate-left"></i>
            <i class="fa-solid fa-arrow-rotate-right"></i>
            <i class="fa-solid fa-cloud-arrow-up"></i>
        </div>

        <div class="nav-right">
            <span>Sample</span>

            <button class="trial-btn">
                👑 Start your trial for ₹0
            </button>

            <button class="present-btn">Present</button>
            <button class="share-btn">Share</button>
        </div>

    </nav>

    <div class="main-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div class="item">
                <i class="fa-solid fa-table-columns"></i>
                <span>Templates</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-shapes"></i>
                <span>Elements</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-font"></i>
                <span>Text</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-camera"></i>
                <span>Brand</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-upload"></i>
                <span>Uploads</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-wrench"></i>
                <span>Tools</span>
            </div>

            <div class="item">
                <i class="fa-regular fa-folder"></i>
                <span>Projects</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-th"></i>
                <span>Apps</span>
            </div>

        </aside>

        <!-- LEFT PANEL -->
        <section class="left-panel">

            <div class="search-box">
                <input type="text"
                       placeholder="Describe your ideal design">
            </div>

            <div class="btn-group">
                <button>✨ Generate</button>
                <button class="search-btn">Search</button>
            </div>

            <h3>Recently used</h3>

            <div class="recent-grid">
                <div class="card"></div>
                <img src="images/add1.jpg" alt="Template 1" class="card">
                <div class="card"></div>
                <img src="images/add2.jpg" alt="Template 2" class="card">
                
            </div>

            <h3>All results</h3>

            <div class="results-grid">
                <div class="result-card"></div>
                <div class="result-card"></div>
                <div class="result-card"></div>
                <div class="result-card"></div>
                <div class="result-card"></div>
                <div class="result-card"></div>
            </div>

        </section>

        <!-- WORKSPACE -->
        <main class="workspace">

            <div class="toolbar">
                <span>Edit</span>
                <span>Effects</span>
                <span>Animate</span>
                <span>Position</span>
            </div>

            <div class="canvas">

                <div class="circle"></div>
                <div class="square"></div>
                <div class="triangle"></div>
                <div class="pentagon"></div>

                <div class="plus"></div>
                <div class="parallelogram"></div>
                <div class="arrow-up"></div>

                <div class="heart-box">
                    <div class="heart"></div>
                </div>

            </div>

            <div class="bottom-bar">
                <span>Notes</span>
                <span>Timer</span>
                <span>53%</span>
                <span>Pages</span>
            </div>

        </main>

    </div>

</body>
</html>
