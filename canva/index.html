<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Canva Clone UI</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="add.css">
    <button class="btn btn-primary">Bootstrap Test</button>
</head>
<body>
    <div class="alert alert-success">
    Bootstrap is working!
</div>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg topbar px-4">
        <div class="container-fluid">

            <div class="d-flex gap-4 text-white fw-semibold">
                <span>File</span>
                <span>Resize</span>
                <span>Editing</span>
            </div>

            <div class="ms-auto d-flex gap-2">
                <button class="btn btn-light">Present</button>
                <button class="btn btn-light">Share</button>
            </div>

        </div>
    </nav>

    <div class="d-flex">

        <!-- Sidebar -->
        <aside class="sidebar bg-white">

            <div class="sidebar-item">Templates</div>
            <div class="sidebar-item">Elements</div>
            <div class="sidebar-item">Text</div>
            <div class="sidebar-item">Brand</div>
            <div class="sidebar-item">Uploads</div>
            <div class="sidebar-item">Tools</div>
            <div class="sidebar-item">Projects</div>
            <div class="sidebar-item">Apps</div>

        </aside>

        <!-- Left Search Panel -->
        <section class="search-panel bg-white p-3">

            <input
                type="text"
                class="form-control mb-3"
                placeholder="Describe your ideal design">

            <div class="row g-2 mb-4">
                <div class="col-6">
                    <button class="btn btn-outline-secondary w-100">
                        Generate
                    </button>
                </div>

                <div class="col-6">
                    <button class="btn btn-primary w-100">
                        Search
                    </button>
                </div>
            </div>

            <h5 class="mb-3">Recently Used</h5>
            
            <div class="row g-2">
                <div class="col-6">
                    <div class="template-card"></div>
                    <img src="images/add1.jpg" alt="Template 1" class="template-card">
                </div>

                <div class="col-6">
                    <div class="template-card"></div>
                    <img src="images/add2.jpg" alt="Template 2" class="template-card">
                </div>
            </div> 

            <h5 class="mt-4 mb-3">All Results</h5>

            <div class="row g-2">
                <div class="col-6"><div class="result-card"></div></div>
                <div class="col-6"><div class="result-card"></div></div>
                <div class="col-6"><div class="result-card"></div></div>
                <div class="col-6"><div class="result-card"></div></div>
                <div class="col-6"><div class="result-card"></div></div>
                <div class="col-6"><div class="result-card"></div></div>
            </div> 

        </section> 

        <!-- Main Canvas -->
        <main class="canvas-area flex-grow-1">

            <div class="canvas">

                <div class="circle"></div>
                <div class="square"></div>
                <div class="triangle"></div>
                <div class="pentagon"></div>

                <div class="plus"></div>
                <div class="parallelogram"></div>
                <div class="arrow-up"></div>
                <div class="heart"></div>

            </div>

        </main>

    </div>

</body> 
</html>
