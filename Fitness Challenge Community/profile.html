<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fitness Battle Arena | Profile</title>

    <link rel="stylesheet" href="profile.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo">

            Fitness Battle Arena

        </div>

        <nav>

            <a href="index.html">Home</a>

            <a href="battle.html">Battle Mode</a>

            <a href="challenge.html">Challenges</a>

            <a href="leaderboard.html">Leaderboard</a>

            <a href="profile.html">Profile</a>

        </nav>

        <button id="themeToggle">

            🌙 Dark

        </button>

    </header>

    <!-- ================= PROFILE ================= -->

    <section class="profile">

        <div class="profile-card">

            <img src="images/mine1.jpg"
                 id="profileImage"
                 alt="Profile Image">

            <h2 id="profileName">

                Nikhil Rathore

            </h2>

            <p id="fitnessGoal">

                💪 Fitness Goal : Muscle Building

            </p>

            <p id="streakText">

                🔥 Current Streak : 30 Days

            </p>

            <button id="editProfile">

                Edit Profile

            </button>

            <button id="increaseStreak">

                +1 Streak

            </button>

        </div>

    </section>

    <!-- ================= TRANSFORMATION ================= -->

    <section class="transformation">

        <h1 id="transformTitle">

            Transformation Journey

        </h1>

        <div class="gallery">

            <div class="photo">

                <img src="images/raj2.jpeg" alt="Day 1">

                <h3>

                    Day 1

                </h3>

            </div>

            <div class="arrow">

                ➜

            </div>

            <div class="photo">

                <img src="images/raj1.jpeg" alt="Day 90">

                <h3>

                    Day 90

                </h3>

            </div>

        </div>

    </section>

    <!-- ================= ANALYTICS ================= -->

    <section class="analytics">

        <div class="box">

            <h2 id="workoutCount">

                120

            </h2>

            <p>

                Workouts

            </p>

        </div>

        <div class="box">

            <h2 id="calorieCount">

                35000

            </h2>

            <p>

                Calories Burned

            </p>

        </div>

        <div class="box">

            <h2 id="badgeCount">

                12

            </h2>

            <p>

                Badges

            </p>

        </div>

        <div class="box">

            <h2 id="streakCount">

                30

            </h2>

            <p>

                Streak

            </p>

        </div>

    </section>
